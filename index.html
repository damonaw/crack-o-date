<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Crack-O-Date - A daily math puzzle game where you create equations using today's date">
    <meta name="keywords" content="math puzzle, daily puzzle, equation game, brain teaser">
    <meta name="author" content="Crack-O-Date">
    <meta property="og:title" content="Crack-O-Date - Daily Math Puzzle">
    <meta property="og:description" content="Create equations using today's date in this engaging math puzzle game">
    <meta property="og:type" content="website">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧮</text></svg>">
    <title>crack-o-date</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <h1 class="navbar-brand"><i class="fas fa-calculator" aria-hidden="true"></i> Crack-O-Date</h1>
        <div class="navbar-controls">
            <ul class="navbar-nav">
                <li class="nav-item"><a href="#" class="nav-link" aria-label="View game rules" data-modal="rules"><i class="fas fa-info-circle" aria-hidden="true"></i> Rules</a></li>
                <li class="nav-item"><a href="#" class="nav-link" aria-label="Select game difficulty" data-modal="difficulty"><i class="fas fa-layer-group" aria-hidden="true"></i> Difficulty</a></li>
                <li class="nav-item"><a href="#" class="nav-link" aria-label="View solutions" data-modal="solutions"><i class="fas fa-trophy" aria-hidden="true"></i> Solutions</a></li>
                <li class="nav-item shortcuts-nav"><a href="#" class="nav-link" aria-label="View keyboard shortcuts" data-modal="shortcuts"><i class="fas fa-keyboard" aria-hidden="true"></i> Shortcuts</a></li>
            </ul>
        </div>
    </nav>

    <main class="container" role="main">
        <div class="game-container">
            <div class="date-header">
                <p class="date-display"><i class="far fa-calendar-alt" aria-hidden="true"></i> Today's date<br /><span id="current-date"></span></p>
            </div>

            <div id="error-message" class="error-message" role="alert" aria-live="polite"></div>

            <div class="date-numbers">
                <div id="date-buttons" class="button-container" role="group" aria-label="Date number buttons"></div>
            </div>

            <div class="operators">
                <div id="operator-buttons" class="button-container" role="group" aria-label="Operator buttons">
                    <button class="btn operator" data-operator="+" aria-label="Add"><i class="fas fa-plus"></i></button>
                    <button class="btn operator" data-operator="-" aria-label="Subtract"><i class="fas fa-minus"></i></button>
                    <button class="btn operator" data-operator="*" aria-label="Multiply"><i class="fas fa-times"></i></button>
                    <button class="btn operator" data-operator="/" aria-label="Divide"><i class="fas fa-divide"></i></button>
                    <button class="btn operator" data-operator="%" aria-label="Modulus"><i class="fas fa-percentage"></i></button>
                    <button class="btn operator" data-operator="(" aria-label="Open parenthesis">(</button>
                    <button class="btn operator" data-operator=")" aria-label="Close parenthesis">)</button>
                    <button class="btn operator" data-operator="^" aria-label="Exponent"><i class="fas fa-superscript"></i></button>
                </div>
            </div>

            <div class="equation-builder">
                <div class="equation-side" id="left-side" role="group" aria-label="Left side of equation"></div>
                <div id="equals-sign" aria-hidden="true">=</div>
                <div class="equation-side" id="right-side" role="group" aria-label="Right side of equation"></div>
            </div>

            <div class="equation-values">
                <span id="left-value" aria-label="Left side value">?</span> = <span id="right-value" aria-label="Right side value">?</span>
            </div>

            <div class="controls">
                <button id="clear-button" class="btn action-btn" aria-label="Clear equation"><i class="fas fa-undo" aria-hidden="true"></i> Clear</button>
                <button id="check-button" class="btn action-btn primary" aria-label="Check equation"><i class="fas fa-check" aria-hidden="true"></i> Check</button>
            </div>
        </div>
    </main>

    <div id="modal" class="modal" role="dialog" aria-labelledby="modal-title" aria-modal="true">
        <div class="modal-content">
            <button class="close" aria-label="Close modal"><i class="fas fa-times"></i></button>
            <h2 id="modal-title">Modal Title</h2>
            <div id="modal-body">Modal content goes here</div>
        </div>
    </div>

    <template id="rules-content">
        <div class="modal-section">
            <h3><i class="fas fa-info-circle" aria-hidden="true"></i> How to Play</h3>
            <ul>
                <li>Use the date numbers (month, day, year) to create your equation</li>
                <li>Each number can only be used once</li>
                <li>Both sides of the equation must equal the same value</li>
                <li>Points are awarded based on the difficulty level and complexity of your solution</li>
            </ul>
        </div>
    </template>

    <template id="solutions-content">
        <div class="modal-section">
            <h3><i class="fas fa-trophy" aria-hidden="true"></i> Your Solutions</h3>
            <div id="solutions-list">
                <p class="no-solutions">No solutions yet. Start playing to see your solutions here!</p>
            </div>
            <div class="modal-actions">
                <button id="delete-solutions" class="btn action-btn" aria-label="Delete all solutions">
                    <i class="fas fa-trash-alt" aria-hidden="true"></i> Delete All Solutions
                </button>
            </div>
        </div>
    </template>

    <template id="confirm-delete-content">
        <div class="modal-section">
            <h3><i class="fas fa-exclamation-triangle" aria-hidden="true"></i> Confirm Delete</h3>
            <p>Are you sure you want to delete all your solutions? This cannot be undone.</p>
            <div class="modal-actions">
                <button class="btn action-btn cancel-delete" aria-label="Cancel deletion">
                    <i class="fas fa-times" aria-hidden="true"></i> Cancel
                </button>
                <button class="btn action-btn confirm-delete" aria-label="Confirm deletion">
                    <i class="fas fa-trash-alt" aria-hidden="true"></i> Delete All
                </button>
            </div>
        </div>
    </template>

    <template id="shortcuts-content">
        <div class="modal-section">
            <h3><i class="fas fa-keyboard" aria-hidden="true"></i> Keyboard Shortcuts</h3>
            <ul>
                <li><kbd>Tab</kbd> - Navigate between elements</li>
                <li><kbd>Enter</kbd> - Select focused button</li>
                <li><kbd>Space</kbd> - Select focused button</li>
                <li><kbd>Escape</kbd> - Close modal</li>
                <li><kbd>1-9</kbd> - Select number buttons</li>
                <li><kbd>+</kbd> - Add operator</li>
                <li><kbd>-</kbd> - Subtract operator</li>
                <li><kbd>*</kbd> - Multiply operator</li>
                <li><kbd>/</kbd> - Divide operator</li>
                <li><kbd>%</kbd> - Modulus operator</li>
                <li><kbd>(</kbd> - Open parenthesis</li>
                <li><kbd>)</kbd> - Close parenthesis</li>
                <li><kbd>^</kbd> - Exponent operator</li>
            </ul>
        </div>
    </template>

    <template id="difficulty-content">
        <div class="modal-section">
            <h3><i class="fas fa-layer-group" aria-hidden="true"></i> Select Difficulty</h3>
            <div class="difficulty-container">
                <label for="difficulty">Difficulty Level:</label>
                <select id="difficulty" aria-label="Select game difficulty">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
            
            <h3><i class="fas fa-info-circle" aria-hidden="true"></i> Difficulty Levels</h3>
            <ul>
                <li><strong>Easy:</strong> Use any date numbers in any order (1 point per solution)</li>
                <li><strong>Medium:</strong> Must use all date digits in order (points based on operators used)</li>
                <li><strong>Hard:</strong> Must use all date digits in order and use +, -, *, and / operators (double points!)</li>
            </ul>
        </div>
    </template>

    <footer role="contentinfo">
        <p>&copy; <span id="current-year"></span> crack-o-date | <i class="fas fa-calculator" aria-hidden="true"></i> Math puzzle game</p>
    </footer>

    <script type="module" src="script.js"></script>
</body>
</html>
